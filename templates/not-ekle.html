<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Yükle - THKÜ Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: rgba(255, 255, 255, 0.07);
      --surface-hover: rgba(255, 255, 255, 0.11);
      --border: rgba(255, 255, 255, 0.12);
      --text: #e8eaf0;
      --text-muted: #7a8299;
      --accent: #4f8ef7;
      --success: #38d9a9;
      --warning: #f5a623;
      --danger: #ff6b6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Üst Başlık */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 { font-size: 1.6rem; font-weight: 600; }
    .btn-back { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
    .btn-back:hover { color: var(--text); }

    /* Form Kartı */
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 40px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); }
    
    .form-control {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      outline: none;
      transition: 0.2s;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.15); }

    input[type="file"] {
      padding: 10px;
      color: var(--text-muted);
    }
    input[type="file"]::file-selector-button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 12px;
      transition: 0.2s;
    }
    input[type="file"]::file-selector-button:hover { background: var(--surface-hover); }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-submit:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Yüklenen Notlar Listesi */
    .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    
    .note-list { display: flex; flex-direction: column; gap: 12px; }
    
    .note-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: 0.2s;
    }
    .note-item:hover { border-color: rgba(255,255,255,0.2); }

    .note-info h3 { font-size: 1rem; font-weight: 500; margin-bottom: 4px; }
    .note-info p { font-size: 0.8rem; color: var(--text-muted); }

    .note-actions { display: flex; align-items: center; gap: 16px; }

    /* Durum Rozetleri */
    .badge { padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
    .badge.onaylandi { background: rgba(56, 217, 169, 0.1); color: var(--success); border: 1px solid rgba(56, 217, 169, 0.2); }
    .badge.beklemede { background: rgba(245, 166, 35, 0.1); color: var(--warning); border: 1px solid rgba(245, 166, 35, 0.2); }
    .badge.reddedildi { background: rgba(255, 107, 107, 0.1); color: var(--danger); border: 1px solid rgba(255, 107, 107, 0.2); }

    .btn-retract {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.3);
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .btn-retract:hover { background: rgba(255, 107, 107, 0.1); border-color: var(--danger); }
  </style>
</head>

<body>
  <div class="container">
    
    <div class="header">
      <h1>Not Yükle</h1>
      <a href="/ders-notlari" class="btn-back">← Ders Notlarına Dön</a>
    </div>

    <div class="card">
      <form id="uploadForm">
        <div class="form-group">
          <label for="dersAdi">Dersin Adı (Örn: Fizik 101)</label>
          <input type="text" id="dersAdi" name="ders_adi" class="form-control" required placeholder="Dersin adını giriniz">
        </div>
        
        <div class="form-group">
          <label for="fileInput">Dosya Seç (PDF, DOCX, PPT vb.)</label>
          <input type="file" id="fileInput" name="file" class="form-control" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Yükle ve Onaya Gönder</button>
      </form>
    </div>

    <h2 class="section-title">Yüklediğim Notlar</h2>
    <div class="note-list" id="myNotesList">
      <div style="text-align: center; color: var(--text-muted); padding: 20px;">Yükleniyor...</div>
    </div>

  </div>

  <script>
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const myNotesList = document.getElementById('myNotesList');

    const escapeHTML = str => {
      if (!str) return '';
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
      return String(str).replace(/[&<>'"]/g, tag => map[tag] || tag);
    };

    const formatDate = dateStr => {
      return new Date(dateStr).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
    };

    const loadMyNotes = async () => {
      try {
        const res = await fetch('/api/kullanici-notlari');
        if (!res.ok) throw new Error('Veri çekilemedi');
        
        const data = await res.json();
        
        if (data.length === 0) {
          myNotesList.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">Henüz hiç not yüklemediniz.</div>';
          return;
        }

        myNotesList.innerHTML = data.map(note => {
          const safeName = escapeHTML(note.ders_adi);
          const safeDate = formatDate(note.tarih);
          
          let badgeClass = '';
          if (note.durum === 'APPROVED') badgeClass = 'onaylandi';
          else if (note.durum === 'PENDING') badgeClass = 'beklemede';
          else badgeClass = 'reddedildi';

          const showRetractBtn = (note.durum === 'PENDING');
          const retractHtml = showRetractBtn 
            ? `<button class="btn-retract" onclick="retractNote(${note.id})">🗑️ Geri Çek</button>` 
            : '';

          return `
            <div class="note-item">
              <div class="note-info">
                <h3>${safeName}</h3>
                <p>${safeDate}</p>
              </div>
              <div class="note-actions">
                <span class="badge ${badgeClass}">${escapeHTML(note.durum)}</span>
                ${retractHtml}
              </div>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error(error);
        myNotesList.innerHTML = '<div style="color: var(--danger); text-align: center; padding: 20px;">Notlarınız yüklenirken bir hata oluştu.</div>';
      }
    };

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.innerText = 'Yükleniyor... Lütfen bekleyin';

      const formData = new FormData(uploadForm);

      try {
        const res = await fetch('/api/not-ekle', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          alert('✓ ' + data.message);
          uploadForm.reset();
          loadMyNotes();
        } else {
          alert('HATA: ' + data.message);
        }
      } catch (error) {
        console.error(error);
        alert('Sunucuya ulaşılamadı. Lütfen daha sonra tekrar deneyin.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Yükle ve Onaya Gönder';
      }
    });

    window.retractNote = async (id) => {
      const isConfirmed = confirm("Bu notu yönetici onayından geri çekmek ve silmek istediğinize emin misiniz?");
      if (!isConfirmed) return;

      try {
        const res = await fetch(`/api/not-geri-cek/${id}`, { method: 'DELETE' });
        const data = await res.json();

        if (res.ok) {
          loadMyNotes();
        } else {
          alert('HATA: ' + data.message);
        }
      } catch (error) {
        console.error(error);
        alert('Bir hata oluştu.');
      }
    };

    document.addEventListener('DOMContentLoaded', loadMyNotes);

  </script>
</body>
</html>
