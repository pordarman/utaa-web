<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Kampüs Platformu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            color-scheme: light;
            color: #333;
        }

        .sidebar {
            width: 250px;
            background: #fff;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .sidebar nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar a {
            color: #666;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 14px;
        }

        .sidebar a:hover {
            background: #f5f5f5;
            color: #333;
        }

        .sidebar a.active {
            background: #333;
            color: white;
        }

        .container {
            margin-left: 250px;
            padding: 40px 60px;
            max-width: 1400px;
            margin-right: auto;
        }

        header {
            background: transparent;
            padding: 0 0 30px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        .back-btn {
            display: none;
        }

        .new-message-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 30px;
        }

        .new-message-card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 15px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #333;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: #333;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background: #000;
        }

        .messages-section h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: 600;
        }

        .message-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .message-card:hover {
            border-color: #ccc;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .message-topic {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .message-date {
            color: #999;
            font-size: 13px;
        }

        .message-content {
            color: #666;
            line-height: 1.7;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .like-btn,
        .dislike-btn {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
        }

        .like-btn:hover {
            background: #333;
            color: white;
            border-color: #333;
        }

        .dislike-btn:hover {
            background: #333;
            color: white;
            border-color: #333;
        }

        .like-btn.active {
            background: #333;
            color: white;
            border-color: #333;
            font-weight: 600;
        }

        .dislike-btn.active {
            background: #333;
            color: white;
            border-color: #333;
            font-weight: 600;
        }

        .like-count {
            background: #f5f5f5;
            color: #333;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid #e0e0e0;
        }

        .empty-state {
            background: white;
            padding: 60px 30px;
            border-radius: 8px;
            text-align: center;
            color: #999;
            font-size: 14px;
            border: 1px solid #e0e0e0;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #f0f9ff;
            color: #0369a1;
            border: 1px solid #bae6fd;
        }

        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .container {
                margin-left: 0;
                padding: 20px;
            }

            .back-btn {
                display: inline-block;
                background: #333;
                color: white;
                padding: 8px 16px;
                border-radius: 6px;
                text-decoration: none;
                font-size: 13px;
            }

            header {
                border-bottom: 1px solid #e0e0e0;
                padding-bottom: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Kampüs</h2>
        <nav>
            <a href="/">Ana Sayfa</a>
            <a href="/forum" class="active">Forum</a>
            <a href="/ders-notlari">Ders Notları</a>
            <a href="/ogretmen-listesi">Öğretmenler</a>
            <a href="/otobus-saatleri">Otobüs Saatleri</a>
            <a href="/yemekhane">Yemekhane</a>
        </nav>
    </div>

    <div class="container">
        <header>
            <h1>Forum</h1>
            <a href="/" class="back-btn">← Geri</a>
        </header>

        <div id="alertContainer"></div>

        <div class="new-message-card">
            <h2>Yeni Mesaj</h2>
            <form id="newMessageForm">
                <div class="form-group">
                    <label for="konu">Konu</label>
                    <input type="text" id="konu" name="konu" placeholder="Mesaj konusunu giriniz..." required>
                </div>
                <div class="form-group">
                    <label for="mesaj_icerigi">Mesaj İçeriği</label>
                    <textarea id="mesaj_icerigi" name="mesaj_icerigi" placeholder="Mesajınızı buraya yazın..."
                        required></textarea>
                </div>
                <button type="submit" class="submit-btn">Gönder</button>
            </form>
        </div>

        <div class="messages-section">
            <h2>Mesajlar</h2>
            <div id="messagesContainer">
                <div class="empty-state">Yükleniyor...</div>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const newMessageForm = document.getElementById('newMessageForm');
        const inputKonu = document.getElementById('konu');
        const inputMesaj = document.getElementById('mesaj_icerigi');
        const alertContainer = document.getElementById('alertContainer');

        // XSS Koruması
        const escapeHTML = str => {
            if (!str) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
            return String(str).replace(/[&<>'"]/g, tag => map[tag] || tag);
        };

        const formatDate = (dateString) => {
            const date = new Date(dateString);
            const diff = Math.floor((new Date() - date) / 1000);

            if (diff < 60) return 'Az önce';
            if (diff < 3600) return `${Math.floor(diff / 60)} dakika önce`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} saat önce`;
            return `${Math.floor(diff / 86400)} gün önce`;
        };

        const showAlert = (message, type) => {
            if (!alertContainer) return;
            const alertEl = document.createElement('div');
            alertEl.className = `alert alert-${type}`;
            alertEl.textContent = message;
            alertContainer.appendChild(alertEl);
            setTimeout(() => alertEl.remove(), 3000);
        };

        const displayMessages = (messages) => {
            if (!messagesContainer) return;

            if (!messages?.length) {
                messagesContainer.innerHTML = '<div class="empty-state">Henüz hiç mesaj yok. İlk mesajı siz gönderin!</div>';
                return;
            }

            messagesContainer.innerHTML = messages.map(message => {
                const safeKonu = escapeHTML(message.konu);
                const safeIcerik = escapeHTML(message.mesaj_icerigi);
                const dateStr = formatDate(message.gonderilme_tarihi);

                const likeActive = message.user_action === 'like' ? 'active' : '';
                const dislikeActive = message.user_action === 'dislike' ? 'active' : '';

                return `
        <div class="message-card">
            <div class="message-header">
                <div class="message-topic">${safeKonu}</div>
                <div class="message-date">${dateStr}</div>
            </div>
            <div class="message-content">${safeIcerik}</div>
            <div class="message-footer">
                <button class="like-btn ${likeActive}" onclick="updateLike(${message.id}, 'like', this)">
                    ▲ Beğen
                </button>
                <button class="dislike-btn ${dislikeActive}" onclick="updateLike(${message.id}, 'dislike', this)">
                    ▼ Beğenme
                </button>
                <div class="like-count" id="like-count-${message.id}">
                    ${message.begeni_sayisi}
                </div>
            </div>
        </div>`;
            }).join('');
        };

        const loadMessages = async () => {
            try {
                const res = await fetch('/api/forum-mesajlari');
                if (!res.ok) {
                    if (res.status === 401) {
                        window.location.href = `/login?next=${encodeURIComponent(window.location.pathname)}`;
                        return;
                    }
                    throw new Error('Mesajlar yüklenemedi');
                }
                const messages = await res.json();
                displayMessages(messages);
            } catch (error) {
                console.error('Hata:', error);
                if (messagesContainer) {
                    messagesContainer.innerHTML = '<div class="empty-state" style="color:var(--danger);">Mesajlar yüklenirken bir hata oluştu.</div>';
                }
            }
        };

        window.updateLike = async (messageId, action, btnElement) => {
            try {
                const res = await fetch(`/api/like-dislike-message/${encodeURIComponent(messageId)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });

                const data = await res.json();

                if (res.ok) {
                    const countEl = document.getElementById(`like-count-${messageId}`);
                    if (countEl) countEl.innerHTML = data.begeni_sayisi;

                    const messageCard = btnElement.closest('.message-card');
                    if (messageCard) {
                        const likeBtn = messageCard.querySelector('.like-btn');
                        const dislikeBtn = messageCard.querySelector('.dislike-btn');

                        if (likeBtn) likeBtn.classList.toggle('active', data.user_action === 'like');
                        if (dislikeBtn) dislikeBtn.classList.toggle('active', data.user_action === 'dislike');
                    }
                } else {
                    showAlert(data.message || 'İşlem gerçekleştirilemedi.', 'error');
                }
            } catch (error) {
                console.error('Beğeni hatası:', error);
                showAlert('Bir hata oluştu.', 'error');
            }
        };

        if (newMessageForm) {
            newMessageForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const submitBtn = newMessageForm.querySelector('button[type="submit"]');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.innerText = 'Gönderiliyor...';
                }

                const konu = inputKonu?.value.trim();
                const mesaj_icerigi = inputMesaj?.value.trim();

                try {
                    const res = await fetch('/api/forum-mesajlari', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ konu, mesaj_icerigi })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        showAlert('Mesajınız başarıyla gönderildi!', 'success');
                        newMessageForm.reset();
                        loadMessages();
                    } else {
                        showAlert(data.message || 'Mesaj gönderilemedi.', 'error');
                    }
                } catch (error) {
                    console.error('Gönderme hatası:', error);
                    showAlert('Bir hata oluştu. Lütfen tekrar deneyin.', 'error');
                } finally {
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Gönder';
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadMessages);
    </script>
</body>

</html>
